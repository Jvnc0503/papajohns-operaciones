openapi: 3.0.0
info:
  title: Papa Johns Empleados API
  version: 1.0.0
  description: API for managing employee tasks in the kitchen, packaging, and dispatch areas.

paths:
  /tasks/cocina:
    get:
      summary: Get tasks for the kitchen (Cocina)
      responses:
        '200':
          description: A list of tasks for the kitchen
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'

  /tasks/empaque:
    get:
      summary: Get tasks for packaging (Empaque)
      responses:
        '200':
          description: A list of tasks for packaging
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'

  /tasks/despacho:
    get:
      summary: Get tasks for dispatch (Despacho)
      responses:
        '200':
          description: A list of tasks for dispatch
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'

  /tenants/{tenantId}/orders/{id}/status:
    patch:
      summary: Update order status
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order status updated successfully
        '400':
          description: Bad request
        '500':
          description: Internal server error

components:
  schemas:
    Task:
      type: object
      properties:
        orderId:
          type: string
          example: "267c290f-1f6d-4df8-8743-ea96ead3c2b0"
        tenantId:
          type: string
          example: "tenant123"
        stage:
          type: string
          example: "COCINA"
        taskToken:
          type: string
          example: ""
        receiptHandle:
          type: string
          example: ""
        customerName:
          type: string
          example: "John Doe"
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
                example: "p1"
              price:
                type: string
                example: "10.5"
              quantity:
                type: string
                example: "2"
        totalAmount:
          type: string
          example: "26"
        status:
          type: string
          example: "RECEPCION"
